<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Selectores Logicos Modernos CSS</title>
    <link rel="stylesheet" href="../../../css/css/selectores/selectores_logicos_modernos.css">
</head>

<body>
    <h1>Ejemplo de Selectores Lógicos Modernos</h1>

    <section>
        <h2>:not()</h2>

        <p class="activo">Párrafo activo</p>
        <p>Párrafo normal</p>
        <p>Párrafo normal</p>

    </section>

    <section>

        <h2>:is()</h2>

        <h3>Título h3</h3>
        <h4>Título h4</h4>
        <h5>Título h5</h5>

    </section>

    <section class="demo-where">
        <h2>:where()</h2>

        <article>Contenido dentro de article</article>
        <section>Contenido dentro de section</section>
    </section>

    <section>

        <h2>:has()</h2>

        <div class="tarjeta">
            <img src="https://via.placeholder.com/100">
            <p>Tarjeta con imagen</p>
        </div>

        <div class="tarjeta">
            <p>Tarjeta sin imagen</p>
        </div>

    </section>

    <section>

        <h2>:matches()</h2>

        <h6>Encabezado h6</h6>
        <h2>Encabezado h2</h2>

    </section>

</body>

</html>
