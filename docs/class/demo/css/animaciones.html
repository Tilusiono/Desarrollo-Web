<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de animaciones en CSS</title>
    <link rel="stylesheet" href="../../css/css/animaciones.css">
</head>

<body>

    <h1>Ejemplo de animaciones en CSS</h1>

    <section class="demo-keyframes">
        <h2 class="grupo-titulo">1. @keyframes</h2>
        <button class="boton boton-keyframes">Animación base</button>
    </section>

    <section class="demo-name">
        <h2 class="grupo-titulo">2. animation-name</h2>
        <button class="boton boton-name">Nombre de animación</button>
    </section>

    <section class="demo-duration">
        <h2 class="grupo-titulo">3. animation-duration</h2>
        <button class="boton boton-duration">Duración</button>
    </section>

    <section class="demo-delay">
        <h2 class="grupo-titulo">4. animation-delay</h2>
        <button class="boton boton-delay">Retraso</button>
    </section>

    <section class="demo-iteration">
        <h2 class="grupo-titulo">5. animation-iteration-count</h2>
        <button class="boton boton-iteration">Repetición</button>
    </section>

    <section class="demo-direction">
        <h2 class="grupo-titulo">6. animation-direction</h2>
        <button class="boton boton-direction">Dirección</button>
    </section>

    <section class="demo-timing">
        <h2 class="grupo-titulo">7. animation-timing-function</h2>
        <button class="boton boton-timing">Velocidad</button>
    </section>

    <section class="demo-fill">
        <h2 class="grupo-titulo">8. animation-fill-mode</h2>
        <button class="boton boton-fill">Fill Mode</button>
    </section>

    <section class="demo-play">
        <h2 class="grupo-titulo">9. animation-play-state</h2>
        <button class="boton boton-play">Pausa al pasar</button>
    </section>

    <section class="demo-shorthand">
        <h2 class="grupo-titulo">10. animation</h2>
        <button class="boton boton-shorthand">Propiedad abreviada</button>
    </section>

</body>

</html>
