<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga 1 - Campeonato Peruano</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
   
    <header class="main-header">
        <div class="banners">
            <img src="./imagenes/banner_liga1.jpg" alt="Banner oficial Liga 1" width="300">
            <img src="./imagenes/banner_estadio.jpeg" alt="Banner del Estadio Nacional" width="300">
            <img src="./imagenes/banner_hinchada.jpg" alt="Banner de la hinchada peruana" width="300">
        </div>
        
        <nav class="main-nav">
            <ul>
                <li><a href="#equipos">Equipos</a></li>
                <li><a href="#destacados">Resultados</a></li>
                <li><a href="#posiciones">Tabla de Posiciones</a></li>
            </ul>
        </nav>
    </header>

    <main>
        
        <section id="equipos">
            <h2>Equipos</h2>
            <div class="grid-container">
               <img src="./imagenes/universitario.jpg" alt="Universitario de Deportes" width="300" height="300">
                <img src="./imagenes/alianza_lima.jpg" alt="Alianza Lima" width="300" height="300">
                <img src="./imagenes/sporting_cristal.jpg" alt="Sporting Cristal" width="300" height="300">
                <img src="./imagenes/melgar.jpg" alt="FBC Melgar" width="300" height="300">
                <img src="./imagenes/cienciano.jpg" alt="Cienciano" width="300" height="300">
                <img src="./imagenes/sport_boys.jpg" alt="Sport Boys" width="300" height="300">
                <img src="./imagenes/Chankas_CYC.jpg" alt="Chankas CYC" width="300" height="300">
                <img src="./imagenes/cusco_fc.jpg" alt="Cusco FC" width="300" height="300">
                <img src="./imagenes/alianza_atletico.jpg" alt="alianza atletico" width="300" height="300">
                <img src="./imagenes/Atlético_Grau.jpg" alt="Atlético_Grau" width="300" height="300">
                <img src="./imagenes/CD_Moquegua.jpg" alt="CD_Moquegua" width="300" height="300">
                <img src="./imagenes/ADT.jpg" alt="ATD" width="300" height="300">
                <img src="./imagenes/Deportivo-Garcilaso.jpg" alt="Deportivo_Garcilaso" width="300" height="300">
                <img src="./imagenes/Juan_Pablo-II .jpg" alt="Juan Pablo II" width="300" height="300">
                <img src="./imagenes/Comerciantes_Unidos.jpg" alt="Comerciantes_Unidos" width="300" height="300">
                <img src="./imagenes/Sport_Huancayo.jpg" alt="Sport_Huancayo" width="300" height="300">
                <img src="./imagenes/FC Cajamarca.jpg" alt="FC Cajamarca" width="300" height="300">
                 <img src="./imagenes/UTC_Cajamarca.jpg" alt="UTC_Cajamarca" width="300" height="300">
            </div>
        </section>

        <section id="destacados">
            <h2>Los más destacados</h2>
            <div class="grid-container">
                <img src="./imagenes/goleador1.jpg" alt="Goleador del torneo" width="300" height="300">
                <img src="./imagenes/arquero1.jpg" alt="Valla menos batida" width="300" height="300">
                <img src="./imagenes/dt1.jpg" alt="Mejor director técnico" width="300" height="300">
                <img src="./imagenes/jugador_revelacion.jpg" alt="Jugador revelación" width="300" height="300">
                <img src="./imagenes/mejor_hinchada.jpg" alt="Asistencia a los estadios" width="300" height="300">
                <img src="./imagenes/fair_play.jpg" alt="Premio juego limpio" width="300" height="300">
            </div>
        </section>

        <section id="tienda">
            <h2>Accesorios y Camisetas</h2>
            <div class="grid-container">
                <img src="./imagenes/camiseta_oficial.jpg" alt="Camiseta oficial de la Liga 1" width="300" height="300">
                <img src="./imagenes/pelota_oficial.jpg" alt="Pelota oficial del campeonato" width="300" height="300">
                <img src="./imagenes/gorra_campeonato.jpg" alt="Gorra oficial del torneo" width="300" height="300">
                <img src="./imagenes/bufanda_hincha.jpg" alt="Bufanda para hinchas" width="300" height="300">
            </div>
        </section>

    </main>

    <footer class="main-footer">
        <div class="media">
            <h3>Redes oficiales de la Liga</h3>
            <div class="social-icons">
                <a href="#" aria-label="Facebook Liga 1"><img src="./imagenes/logo_fb.jpg" alt="Facebook" width="50" height="50"></a>
                <a href="#" aria-label="Instagram Liga 1"><img src="./imagenes/logo_ig.jpg" alt="Instagram" width="50" height="50"></a>
                <a href="#" aria-label="TikTok Liga 1"><img src="./imagenes/logo_tk.jpg" alt="TikTok" width="50" height="50"></a>
            </div>
        </div>
    </footer>

</body>
</html>
