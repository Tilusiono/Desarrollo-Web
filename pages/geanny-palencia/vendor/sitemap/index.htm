alt="lustracion multimedia en una pagina 
web"
title="contenido multimedia en HTML"
width="600" height="400"
loading="lazy" decoding="async"
fetchpriority="high"
sizes="(max-width:600px) 100vw, 600px"
referrerpolicy="no-referrer"
usemap="#mapa-interactivo"
draggable="false" >
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La dormitada del año</title>
  
  <style>
    /* Contenedor principal */
    .carrusel {
      position: relative;
      max-width: 800px;
      margin: auto;
      overflow: hidden;
      border-radius: 8px;
    }

    /* Contenedor de fotos */
    .carrusel-fotos {
      position: relative;
      width: 100%;
      height: 400px;
    }

    /* Estilo para cada imagen */
    .foto {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    /* Imagen visible */
    .foto.activa {
      opacity: 1;
    }

    /* Botones */
    .btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      padding: 15px;
      cursor: pointer;
      font-size: 18px;
      border-radius: 50%;
      transition: background 0.3s;
      z-index: 10; /* Asegura que los botones queden por encima de las fotos */
    }

    .btn:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }

    .prev { left: 10px; }
    .next { right: 10px; } 
  </style>
</head>
<body>

  <h1>La dormitada del año</h1>

  <div class="carrusel">
    <!-- Contenedor de las imágenes -->
    <div class="carrusel-fotos">
      <img src="https://picsum.photos/800/400?random=1" alt="Imagen 1" class="foto activa">
      <img src="https://picsum.photos/800/400?random=2" alt="Imagen 2" class="foto">
      <img src="https://picsum.photos/800/400?random=3" alt="Imagen 3" class="foto">
    </div>

    <!-- Botones de navegación -->
    <button class="btn prev" onclick="cambiarFoto(-1)">&#10094;</button>
    <button class="btn next" onclick="cambiarFoto(1)">&#10095;</button>
  </div>

  <script>
    let indiceActual = 0;

    function cambiarFoto(direccion) {
      const fotos = document.querySelectorAll('.foto');
      
      // Quitamos la clase 'activa' de la foto actual
      fotos[indiceActual].classList.remove('activa');
      
      // Calculamos el nuevo índice
      indiceActual += direccion;
      
      // Si llegamos al final, volvemos al principio
      if (indiceActual >= fotos.length) {
        indiceActual = 0;
      }
      // Si vamos hacia atrás desde el principio, nos lleva a la última
      if (indiceActual < 0) {
        indiceActual = fotos.length - 1;
      }
      
      // Añadimos la clase 'activa' a la nueva foto
      fotos[indiceActual].classList.add('activa');
    }

    // Opcional: Autoplay (cambia de foto cada 4 segundos)
    setInterval(() => {
      cambiarFoto(1);
    }, 4000);
  </script>

</body>
</html>
